  preferences:
    btc_perps: ["binance", "hyperliquid", "dydx_v4"]
    eth_perps: ["binance", "hyperliquid", "dydx_v4"]
    altcoin_perps: ["binance", "bybit"]
    btc_futures: ["binance", "deribit"]
    btc_options: ["deribit"]
    altcoin_spot: ["binance", "uniswap_v3"]
    
  # Failover configuration
  failover:
    enabled: true
    max_retries: 3
    timeout_seconds: 30
    
  # Cross-venue arbitrage pairs
  arbitrage_pairs:
    - ["binance", "hyperliquid"]
    - ["binance", "dydx_v4"]
    - ["hyperliquid", "dydx_v4"]
