name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
assignees: ["abailey81"]

body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve the system? We would love to hear it. Please describe the feature and why it would be useful.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system does this relate to?
      options:
        - Data Collection (Phase 1)
        - Altcoin StatArb Strategy (Phase 2)
        - BTC Futures Curve Trading (Phase 3)
        - Backtesting Engine
        - Portfolio Optimization
        - Reporting / Visualizations
        - Configuration
        - Execution Layer
        - New Strategy
        - New Venue Integration
        - Developer Experience
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Important
        - Critical for my use case
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What limitation are you hitting?
      placeholder: "I am frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any references, screenshots, research papers, or examples that support this request.
    validations:
      required: false
